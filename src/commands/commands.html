<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>

<!-- Office JS obligatoire -->
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

<script>
Office.onReady(() => {
    console.log("Commands loaded");
});

/**
 * Fonction appelée par le manifest
 */
function openConfirmDialog(event){

    const url = "https://dellasiegaexternal2.github.io/Herisson/src/confirm.html";

    Office.context.ui.displayDialogAsync(url,{
        height:70,
        width:60
    });

    event.completed();
}

// IMPORTANT → rendre visible pour Outlook
window.openConfirmDialog = openConfirmDialog;

</script>

</head>
<body>
</body>
</html>
