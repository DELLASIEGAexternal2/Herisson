<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Confirmation</title>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>

  <link rel="stylesheet" href="confirm.css">
</head>

<body>

<!-- LOADER -->
<div id="loader" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.85);
  z-index:999;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:14px;
  color:#0c3c78;
">
  🔍 Envoyé au CERT pour Analyse...
</div>

<div class="modal-container">

  <div class="header">
    <img src="../assets/icon-32.png">
    <span>Demande de confirmation</span>
  </div>

  <div class="content">

    <table class="mail-table">
      <thead>
        <tr>
          <th>Emetteur</th>
          <th>Objet</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        <tr class="selected">
          <td id="sender">—</td>
          <td id="subject">—</td>
          <td id="date">—</td>
        </tr>
      </tbody>
    </table>

    <p><strong>Confirmez-vous vouloir signaler ce mail ?</strong></p>

    <textarea id="comment" placeholder="Commentaire..."></textarea>

  </div>

  <div class="footer">
    <div class="buttons">
      <button id="btnYes">Oui</button>
      <button id="btnNo">Non</button>
    </div>
  </div>

</div>

<script src="confirm.js"></script>

</body>
</html>
